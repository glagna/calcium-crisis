// ─── Glossary ────────────────────────────────────────────────────────────────
const GLOSSARY = [
  { term: "PTH (Parathyroid Hormone)", def: "Hormone released by the parathyroid glands when blood calcium is LOW. It raises calcium by pulling it from bones, saving it in kidneys, and activating Vitamin D.", related: ["Parathyroid Glands", "Calcium"] },
  { term: "Calcitonin", def: "Hormone released by the thyroid gland when blood calcium is HIGH. It lowers calcium by pushing it into bones and increasing kidney excretion. Plays a smaller, fine-tuning role compared to PTH.", related: ["Calcium", "Thyroid"] },
  { term: "Vitamin D", def: "A nutrient the body makes from sunlight (or gets from food/supplements). Must be activated by the liver then kidneys before it works. The active form tells the intestines to absorb calcium.", related: ["Kidneys", "Calcium"] },
  { term: "Calcium (Ca²⁺)", def: "A mineral essential for muscle contraction, nerve signaling, and bone strength. Normal blood level: 8.5 to 10.5 mg/dL. Too high or too low is dangerous.", related: ["PTH", "Calcitonin"] },
  { term: "Parathyroid Glands", def: "Four tiny glands behind the thyroid in the neck. They sense blood calcium levels and release PTH when calcium drops. They are the SENSOR in the feedback loop.", related: ["PTH", "Feedback Loop"] },
  { term: "Feedback Loop", def: "A cycle where the body detects a change, responds to correct it, then monitors the result. In calcium homeostasis: sensor (parathyroids) → signal (PTH) → effectors (kidneys, intestines, bones) → calcium normalizes → sensor detects the change → loop repeats.", related: ["Homeostasis"] },
  { term: "Homeostasis", def: "The body's ability to maintain stable internal conditions (like blood calcium, temperature, pH) despite changing external conditions.", related: ["Feedback Loop"] },
  { term: "Adenoma", def: "A benign (non-cancerous) tumor. A parathyroid adenoma produces too much PTH, causing calcium to rise uncontrollably.", related: ["Parathyroid Glands", "PTH"] },
  { term: "Diuretic", def: "A medication that increases urine production. Loop diuretics (like furosemide/Lasix) flush calcium OUT. Thiazide diuretics (like hydrochlorothiazide) keep calcium IN. Opposite effects on calcium.", related: ["Kidneys", "Calcium"] },
  { term: "Rickets", def: "Softening and weakening of bones in children, usually caused by severe Vitamin D deficiency. The bones do not get enough calcium to harden properly.", related: ["Vitamin D", "Calcium"] },
  { term: "Alkaline Phosphatase", def: "An enzyme found in bones and liver. High levels in blood suggest increased bone activity (either building or breaking down). Used as a lab marker for bone disease.", related: ["Bones"] },
  { term: "Celiac Disease", def: "An autoimmune condition where gluten damages the intestinal lining, reducing absorption of nutrients including Vitamin D and calcium.", related: ["Intestines", "Vitamin D"] },
  { term: "PPI (Proton Pump Inhibitor)", def: "A medication that blocks stomach acid production (e.g., omeprazole). Long-term use reduces calcium absorption because stomach acid is needed to dissolve calcium from food.", related: ["Calcium", "Diuretic"] },
  { term: "Prednisone / Steroids", def: "Anti-inflammatory medications used for asthma, arthritis, and autoimmune diseases. Long-term use reduces calcium absorption in the intestines and increases calcium loss through the kidneys, silently thinning bones.", related: ["Calcium", "Bones"] },
  { term: "DiGeorge Syndrome", def: "A genetic condition where the parathyroid glands (and other structures) fail to develop. Without parathyroids, there is no PTH, and the entire calcium feedback loop is silent from birth.", related: ["Parathyroid Glands", "PTH"] },
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function barColor(ca) {
  if (ca <= 7.5 || ca >= 12.5) return "#dc2626";
  if (ca <= 8.5 || ca >= 10.5) return "#f59e0b";
  return "#22c55e";
}
function zoneLabel(ca) {
  if (ca <= 7.5) return "⚠️ HYPOCALCEMIA";
  if (ca <= 8.5) return "LOW";
  if (ca >= 12.5) return "⚠️ HYPERCALCEMIA";
  if (ca >= 10.5) return "HIGH";
  return "✓ NORMAL";
}

// ─── Flow Particles ──────────────────────────────────────────────────────────
function Particles({ pathId, count, color, speed, size, shape }) {
  const pts = useMemo(() => Array.from({ length: count }, (_, i) => ({ id: i, d: (i / count) * speed })), [count, speed]);
  const s = size || 3;
  const motion = (delay) => (
    <animateMotion dur={`${speed}s`} repeatCount="indefinite" begin={`${delay}s`} keyPoints="0;1" keyTimes="0;1">
      <mpath href={`#${pathId}`} />
    </animateMotion>
  );
  if (shape === "star") {
    const r = s * 2, ri = s * 0.7;
    const p = Array.from({ length: 8 }, (_, i) => {
      const a = (Math.PI / 4) * i - Math.PI / 2, rad = i % 2 === 0 ? r : ri;
      return `${Math.cos(a) * rad},${Math.sin(a) * rad}`;
    }).join(" ");
    return <>{pts.map((pt) => <g key={pt.id} opacity={0.95}><polygon points={p} fill={color}><animate attributeName="opacity" values="1;0.5;1" dur="0.7s" repeatCount="indefinite" /></polygon>{motion(pt.d)}</g>)}</>;
  }
  if (shape === "diamond") {
    const d = s * 1.5;
    return <>{pts.map((pt) => <g key={pt.id} opacity={0.95}><rect x={-d} y={-d} width={d*2} height={d*2} rx={1} fill={color} transform="rotate(45)"><animate attributeName="opacity" values="0.95;0.55;0.95" dur="0.8s" repeatCount="indefinite" /></rect>{motion(pt.d)}</g>)}</>;
  }
  return <>{pts.map((pt) => <circle key={pt.id} r={s} fill={color} opacity={0.9}>{motion(pt.d)}</circle>)}</>;
}

  const [levelScores, setLevelScores] = useState({}); // { 1: { ok, total, pct }, 2: {...} }
  const [ca, setCa] = useState(10.0);
  const [targetCa, setTargetCa] = useState(10.0);
  const [anim, setAnim] = useState(false);
  const [scenarios, setScenarios] = useState([]);
  const [idx, setIdx] = useState(0);
  const [score, setScore] = useState(0);
  const [streak, setStreak] = useState(0);
  const [best, setBest] = useState(0);
  const [fb, setFb] = useState(null);
  const [history, setHistory] = useState([]);
  const [hormone, setHormone] = useState(null);
  const [brokenHighlight, setBrokenHighlight] = useState(null); // for L3 diagram
  const [timer, setTimer] = useState(null);
  const [ticking, setTicking] = useState(false);
  const [reflectPick, setReflectPick] = useState(null);
  const [unlockLevel, setUnlockLevel] = useState(null); // which level was just unlocked
  const tRef = useRef(null);

  useEffect(() => {
    if (!anim) return;
    const step = targetCa > ca ? 0.05 : -0.05;
    if (Math.abs(ca - targetCa) < 0.06) { setCa(Math.round(targetCa * 10) / 10); setAnim(false); return; }
    const id = setTimeout(() => setCa(c => Math.round((c + step) * 100) / 100), 30);
    return () => clearTimeout(id);
  }, [ca, targetCa, anim]);

  useEffect(() => {
    if (!ticking || !timer || timer <= 0) return;
    if (timer <= 5) SFX.timerWarn();
    tRef.current = setTimeout(() => setTimer(t => t - 1), 1000);
    return () => clearTimeout(tRef.current);
  }, [timer, ticking]);

  useEffect(() => { if (ticking && timer === 0 && !learningMode) pick("none"); }, [timer, ticking, learningMode]); // eslint-disable-line react-hooks/exhaustive-deps

  // When a new (non-baseline) scenario appears, shift Ca²⁺ to show the disruption
  useEffect(() => {
    if (phase !== "playing" || !scenarios[idx] || scenarios[idx].baseline || scenarios[idx].effect === 0) return;
    const sc = scenarios[idx];
    const disrupted = Math.round(Math.min(Math.max(ca + sc.effect, 6), 14) * 10) / 10;
    const id = setTimeout(() => { setTargetCa(disrupted); setAnim(true); }, 400);
    return () => clearTimeout(id);
  }, [idx, phase]); // eslint-disable-line react-hooks/exhaustive-deps

  const buildScenarios = useCallback((lvl) => {
    if (lvl === 1) {
      const eq = [5, 9, 10];
      const eqPick = shuffle(SCENARIOS_L1.filter(s => eq.includes(s.id))).slice(0, 1);
      const rest = shuffle(SCENARIOS_L1.filter(s => !eq.includes(s.id))).slice(0, 4);
      const ordered = [...rest];
      const eqPos = 1 + Math.floor(Math.random() * 2);
      ordered.splice(eqPos, 0, eqPick[0]);
      return [BASELINE, ...ordered];
    }
    if (lvl === 2) {
      // Guarantee at least 2 vitd-correct and 2 non-vitd scenarios
      const vitdScenarios = shuffle(SCENARIOS_L2.filter(s => s.correct === "vitd")).slice(0, 3);
      const otherScenarios = shuffle(SCENARIOS_L2.filter(s => s.correct !== "vitd")).slice(0, 2);
      return [BASELINE_L2, ...shuffle([...vitdScenarios, ...otherScenarios])];
    }
    // Level 3
    const organs = ["parathyroid", "kidneys", "gut", "bones"];
    const picks = [];
    // One from each organ type to ensure variety
    for (const org of organs) {
      const pool = SCENARIOS_L3.filter(s => s.broken === org);
      if (pool.length) picks.push(shuffle(pool)[0]);
    }
    // Fill to 5 with random remaining
    const remaining = shuffle(SCENARIOS_L3.filter(s => !picks.find(p => p.id === s.id)));
    while (picks.length < 5 && remaining.length) picks.push(remaining.shift());
    return [BASELINE_L3, ...shuffle(picks)];
  }, []);

  const [hasSeenHowItWorks, setHasSeenHowItWorks] = useState(false);
  const [hasSeenVitDIntro, setHasSeenVitDIntro] = useState(false);
  const [hasSeenL3Intro, setHasSeenL3Intro] = useState(false);
  const [showFullWhy, setShowFullWhy] = useState(false); // hint system: false = show hint only
  const [showCounsel, setShowCounsel] = useState(false); // counseling step toggle
  const [showGlossary, setShowGlossary] = useState(false); // glossary overlay toggle
  const [glossarySearch, setGlossarySearch] = useState(""); // glossary search filter

  const startLevel = useCallback((lvl, skipIntro) => {
    const built = buildScenarios(lvl);
    setLevel(lvl);
    setScenarios(built);
    setIdx(0); setCa(10); setTargetCa(10); setScore(0); setStreak(0); setBest(0);
    setHistory([]); setFb(null); setHormone(null); setBrokenHighlight(null);
    setTimer(null); setTicking(false); setReflectPick(null);
    if (lvl === 1 && !hasSeenHowItWorks && !skipIntro) {
      setPhase("howItWorks");
    } else if (lvl === 2 && !hasSeenVitDIntro && !skipIntro) {
      setPhase("vitDIntro");
    } else if (lvl === 3 && !hasSeenL3Intro && !skipIntro) {
      setPhase("loopIntro");
    } else {
      setPhase("playing");
    }
  }, [buildScenarios, hasSeenHowItWorks, hasSeenVitDIntro, hasSeenL3Intro]);

  const pick = useCallback((choice) => {
    setTicking(false); clearTimeout(tRef.current);
    const sc = scenarios[idx];
    const ok = choice === sc.correct;
    const out = choice === "none";
    if (!out) {
      if (level <= 2) setHormone(choice);
      else setBrokenHighlight(choice); // L3: highlight chosen organ
    }
    const corrected = Math.round(Math.min(Math.max(ca - sc.effect * 0.7, 7.5), 12) * 10) / 10;
    const ns = ok ? streak + 1 : 0;
    const pts = ok ? 100 + (ns > 1 ? (ns - 1) * 25 : 0) : 0;
    setScore(s => s + pts); setStreak(ns); if (ns > best) setBest(ns);
    setFb({ ok, out, sc, choice, pts, ns, fixed: corrected });
    setHistory(h => [...h, { title: sc.title, ok, out, choice, ans: sc.correct }]);
    if (ok) SFX.correct(); else if (!out) SFX.wrong();
    setPhase("feedback");
    setTimeout(() => {
      if (level <= 2) {
        if (!ok && !out) setHormone(sc.correct);
        if (ok) { setTargetCa(corrected); setAnim(true); }
        if (!ok) { setTimeout(() => { setTargetCa(corrected); setAnim(true); }, 800); }
      } else {
        // L3: show the correct broken organ
        setBrokenHighlight(sc.correct);
        if (ok) { setTargetCa(corrected); setAnim(true); }
        if (!ok) { setTimeout(() => { setTargetCa(corrected); setAnim(true); }, 800); }
      }
    }, 1200);
  }, [scenarios, idx, ca, streak, best, level]);

  const next = useCallback(() => {
    setHormone(null);
    setBrokenHighlight(null);
    setShowFullWhy(false);
    setShowCounsel(false);
    setShowGlossary(false);
    if (idx + 1 >= scenarios.length) { setPhase("results"); setTicking(false); }
    else { setIdx(i => i + 1); setFb(null); setPhase("playing"); if (!learningMode) { setTimer(level === 3 ? 40 : 35); setTicking(true); } else { setTimer(null); setTicking(false); } }
  }, [idx, scenarios.length, learningMode, level]);

  const sc = scenarios[idx];

  // ─── Styles ────────────────────────────────────────────────────────────
  const P = {
    page: { fontFamily: "'Segoe UI',system-ui,sans-serif", maxWidth: 900, margin: "0 auto", padding: "12px 16px", background: "linear-gradient(135deg,#0f172a,#1e293b)", minHeight: "100vh", color: "#e2e8f0" },
    title: { fontSize: 24, fontWeight: 800, background: "linear-gradient(90deg,#f472b6,#818cf8,#38bdf8)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", margin: 0, textAlign: "center", letterSpacing: -0.5 },
    card: { background: "#1e293b", borderRadius: 14, padding: "14px 16px", marginBottom: 12, border: "1px solid #334155" },
    btn: c => ({ flex: 1, padding: "14px 10px", borderRadius: 12, border: `2px solid ${c}`, background: `${c}30`, color: "#f1f5f9", fontSize: 18, fontWeight: 800, cursor: "pointer", transition: "all 0.15s", textAlign: "center" }),
    go: { display: "block", width: "100%", padding: "12px", borderRadius: 10, border: "none", background: "linear-gradient(90deg,#818cf8,#38bdf8)", color: "#0f172a", fontSize: 15, fontWeight: 700, cursor: "pointer", marginTop: 10 },
  };

  // ─── Hint generator (1-line nudge for wrong answers) ───────────────────
  const getHint = (sc, choice) => {
    if (level === 1) {
      if (sc.effect < 0 && choice === "calcitonin") return "Ca²⁺ is low. Calcitonin lowers it further. Which hormone raises Ca²⁺?";
      if (sc.effect > 0 && choice === "pth") return "Ca²⁺ is already high. PTH raises it more. Which hormone brings it down?";
      return sc.effect < 0 ? "Ca²⁺ is dropping. The body needs to raise it." : "Ca²⁺ is spiking. The body needs to lower it.";
    }
    if (level === 2) {
      if (sc.correct === "vitd" && choice !== "vitd") return "The problem is not hormone signaling. The body is missing a nutrient it needs to absorb calcium.";
      if (sc.correct !== "vitd" && choice === "vitd") return "Vitamin D levels are fine here. This is a hormone regulation problem.";
      return sc.effect < 0 ? "Ca²⁺ is low. Is the issue hormones, or is a nutrient missing?" : "Ca²⁺ is high. Which response brings it down?";
    }
    // Level 3
    return "Follow the signal path: sensor (parathyroids) → signal (PTH) → effectors (kidneys, intestines, bones). Where does the chain break?";
  };

  // ─── Gauge ─────────────────────────────────────────────────────────────
  const Gauge = () => (
    <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", background: "#1e293b", borderRadius: 12, marginBottom: 10, border: "1px solid #334155" }}>
      <div style={{ fontSize: 9, fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, width: 50 }}>Ca²⁺</div>
      <div style={{ flex: 1, position: "relative", height: 20, borderRadius: 10, background: "#0f172a", overflow: "hidden" }}>
        <div style={{ position: "absolute", inset: 0, display: "flex" }}>
          <div style={{ flex: 1.5, background: "rgba(220,38,38,0.25)" }} />
          <div style={{ flex: 1, background: "rgba(245,158,11,0.2)" }} />
          <div style={{ flex: 2, background: "rgba(34,197,94,0.2)" }} />
          <div style={{ flex: 1, background: "rgba(245,158,11,0.2)" }} />
          <div style={{ flex: 1.5, background: "rgba(220,38,38,0.25)" }} />
        </div>
        <div style={{ position: "absolute", top: -2, bottom: -2, width: 4, background: "#fff", borderRadius: 2, left: `${Math.min(Math.max(((ca - 6) / 8) * 100, 1), 99)}%`, transition: "left 0.3s", boxShadow: "0 0 8px rgba(255,255,255,0.6)" }} />
      </div>
      <div style={{ fontSize: 22, fontWeight: 800, color: barColor(ca), fontVariantNumeric: "tabular-nums", minWidth: 80, textAlign: "right" }}>
        {ca.toFixed(1)}<span style={{ fontSize: 10, color: "#64748b" }}> mg/dL</span>
      </div>
      <div style={{ fontSize: 10, fontWeight: 700, color: barColor(ca), width: 90, textAlign: "center" }}>{zoneLabel(ca)}</div>
    </div>
  );

  // ─── Stats bar ─────────────────────────────────────────────────────────
  const Stats = () => (
    <div style={{ display: "flex", justifyContent: "center", gap: 24, marginBottom: 10 }}>
      {[{ n: score, l: "PTS" }, { n: streak > 0 ? `${streak}🔥` : "0", l: "STREAK" }, ...(learningMode ? [{ n: "📖", l: "LEARN" }] : [{ n: `${timer}s`, l: "TIME", c: timer <= 5 ? "#dc2626" : "#f1f5f9" }])].map((s, i) => (
        <div key={i} style={{ textAlign: "center" }}>
          <div style={{ fontSize: 20, fontWeight: 800, color: s.c || "#f1f5f9" }}>{s.n}</div>
          <div style={{ fontSize: 9, color: "#64748b", textTransform: "uppercase", letterSpacing: 0.8 }}>{s.l}</div>
        </div>
      ))}
    </div>
  );

  // ─── Level badge ───────────────────────────────────────────────────────
  const LevelBadge = () => {
    const l = LEVELS[level - 1];
    return (
      <div style={{ textAlign: "center", marginBottom: 6 }}>
        <span style={{ fontSize: 10, fontWeight: 700, color: l.color, background: `${l.color}18`, padding: "3px 12px", borderRadius: 12, border: `1px solid ${l.color}40`, letterSpacing: 0.5 }}>
          {l.icon} LEVEL {l.num}: {l.name.toUpperCase()}
        </span>
      </div>
    );
  };

  // ─── Answer label helper ───────────────────────────────────────────────
  const answerLabel = (correct) => {
    if (level <= 2) {
      if (correct === "pth") return { text: "PTH ↑ Ca²⁺", color: "#818cf8" };
      if (correct === "calcitonin") return { text: "Calcitonin ↓ Ca²⁺", color: "#f472b6" };
      if (correct === "vitd") return { text: "☀️ Vitamin D supplement", color: "#f59e0b" };
    }
    // Level 3
    const labels = { parathyroid: "Parathyroid Glands", kidneys: "Kidneys", gut: "Intestines", bones: "Bones" };
    return { text: `🔗 ${labels[correct] || correct}`, color: "#dc2626" };
  };

  // ─── INTRO ─────────────────────────────────────────────────────────────
  if (phase === "intro") return (
    <div style={P.page}>
      <h1 style={{ ...P.title, fontSize: 32, marginTop: 16 }}>CALCIUM CRISIS</h1>
      <p style={{ textAlign: "center", fontSize: 12, color: "#64748b", marginTop: 2, marginBottom: 16 }}>Homeostasis Review Game</p>
      <div style={{ maxWidth: 460, margin: "0 auto 16px" }}>
        <Diagram hormone={null} />
      </div>
      <div style={{ textAlign: "center" }}>
        <p style={{ fontSize: 14, color: "#94a3b8", maxWidth: 480, margin: "0 auto 16px", lineHeight: 1.6 }}>
          Life events shift blood calcium. Pick the right response. Watch the body react. Three levels of increasing complexity.
        </p>
        <div style={{ display: "flex", justifyContent: "center", gap: 12, marginBottom: 20, flexWrap: "wrap" }}>
          {LEVELS.map(l => (
            <div key={l.num} style={{
              fontSize: 11, color: l.color, background: `${l.color}10`, padding: "6px 14px", borderRadius: 10,
              border: `1px solid ${l.color}30`, textAlign: "center", minWidth: 110,
            }}>
              <div style={{ fontWeight: 800 }}>{l.icon} Level {l.num}</div>
              <div style={{ fontSize: 9, color: "#94a3b8", marginTop: 2 }}>{l.desc}</div>
            </div>
          ))}
        </div>
        <button style={{ ...P.go, display: "inline-block", width: "auto", padding: "14px 48px", fontSize: 16 }}
          onClick={() => { SFX.click(); setPhase("levelSelect"); }} onMouseOver={e => e.target.style.transform = "scale(1.03)"} onMouseOut={e => e.target.style.transform = "scale(1)"}>
          Choose Level →
        </button>
      </div>
    </div>
  );

  // ─── LEVEL SELECT ──────────────────────────────────────────────────────
  if (phase === "levelSelect") return (
    <div style={P.page}>
      <h1 style={{ ...P.title, fontSize: 28, marginTop: 12 }}>CALCIUM CRISIS</h1>
      <p style={{ textAlign: "center", fontSize: 13, color: "#94a3b8", marginBottom: 20 }}>Choose your challenge</p>
      <div style={{ maxWidth: 500, margin: "0 auto", display: "flex", flexDirection: "column", gap: 12 }}>
        {LEVELS.map(l => {
          const isUnlocked = unlocked.includes(l.num);
          const completed = levelScores[l.num];
          return (
            <button key={l.num} disabled={!isUnlocked}
              onClick={() => { if (isUnlocked) { SFX.click(); startLevel(l.num); } }}
              onMouseOver={e => { if (isUnlocked) e.currentTarget.style.transform = "translateY(-2px)"; }}
              onMouseOut={e => { if (isUnlocked) e.currentTarget.style.transform = "translateY(0)"; }}
              style={{
                background: isUnlocked ? "#1e293b" : "#0f172a",
                border: `2px solid ${isUnlocked ? l.color : "#334155"}`,
                borderRadius: 14, padding: "16px 20px", cursor: isUnlocked ? "pointer" : "not-allowed",
                opacity: isUnlocked ? 1 : 0.5, transition: "all 0.2s", textAlign: "left",
                display: "flex", alignItems: "center", gap: 16,
              }}>
              <div style={{ fontSize: 36 }}>{isUnlocked ? l.icon : "🔒"}</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 16, fontWeight: 800, color: isUnlocked ? l.color : "#475569" }}>
                  Level {l.num}: {l.name}
                </div>
                <div style={{ fontSize: 12, color: isUnlocked ? "#94a3b8" : "#475569", marginTop: 2 }}>{l.desc}</div>
                <div style={{ fontSize: 10, color: "#64748b", marginTop: 4 }}>
                  {l.scenarioCount} scenarios · {l.num === 3 ? "40 sec each" : "35 sec each"}
                </div>
              </div>
              {completed && (
                <div style={{ textAlign: "center", padding: "6px 12px", background: `${l.color}15`, borderRadius: 8 }}>
                  <div style={{ fontSize: 16, fontWeight: 800, color: l.color }}>{completed.pct}%</div>
                  <div style={{ fontSize: 8, color: "#64748b", textTransform: "uppercase" }}>Best</div>
                </div>
              )}
              {!isUnlocked && (
                <div style={{ fontSize: 10, color: "#475569", fontStyle: "italic" }}>Complete Level {l.num - 1} to unlock</div>
              )}
            </button>
          );
        })}
      </div>
      {/* Learning Mode toggle */}
      <div style={{ maxWidth: 500, margin: "16px auto 0", display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }}>
        <button onClick={() => setLearningMode(m => !m)}
          style={{
            display: "flex", alignItems: "center", gap: 8, padding: "8px 16px", borderRadius: 10,
            border: `1.5px solid ${learningMode ? "#22c55e" : "#334155"}`,
            background: learningMode ? "rgba(34,197,94,0.1)" : "transparent",
            color: learningMode ? "#22c55e" : "#94a3b8", fontSize: 12, fontWeight: 600, cursor: "pointer", transition: "all 0.2s",
          }}>
          <span style={{ width: 14, height: 14, borderRadius: 4, display: "inline-flex", alignItems: "center", justifyContent: "center",
            background: learningMode ? "#22c55e" : "transparent", border: `1.5px solid ${learningMode ? "#22c55e" : "#64748b"}`,
            color: "#0f172a", fontSize: 10, fontWeight: 800 }}>{learningMode ? "✓" : ""}</span>
          📖 Learning Mode (no timer)
        </button>
      </div>
      <div style={{ textAlign: "center", marginTop: 10 }}>
        <button onClick={() => setPhase("intro")} style={{ background: "none", border: "1px solid #334155", borderRadius: 8, padding: "8px 20px", color: "#94a3b8", fontSize: 12, cursor: "pointer" }}>
          ← Back
        </button>
      </div>
    </div>
  );

  // ─── UNLOCK TRANSITION ─────────────────────────────────────────────────
  if (phase === "unlock" && unlockLevel) {
    const ul = LEVELS[unlockLevel - 1];
    return (
      <div style={P.page}>
        <div style={{ maxWidth: 460, margin: "60px auto", textAlign: "center" }}>
          <div style={{ fontSize: 72, marginBottom: 16, animation: "none" }}>🔓</div>
          <h2 style={{ fontSize: 28, fontWeight: 800, color: ul.color, marginBottom: 8 }}>
            Level {ul.num} Unlocked!
          </h2>
          <div style={{ fontSize: 16, color: "#94a3b8", marginBottom: 4 }}>{ul.icon} {ul.name}</div>
          <div style={{ fontSize: 13, color: "#64748b", marginBottom: 24 }}>{ul.desc}</div>
          <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
            <button onClick={() => { SFX.click(); startLevel(unlockLevel); }}
              style={{ ...P.go, display: "inline-block", width: "auto", padding: "14px 36px" }}>
              Play Level {ul.num} →
            </button>
            <button onClick={() => { SFX.click(); setUnlockLevel(null); setPhase("levelSelect"); }}
              style={{ background: "none", border: "1px solid #334155", borderRadius: 10, padding: "14px 24px", color: "#94a3b8", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>
              Level Select
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ─── HOW IT WORKS ──────────────────────────────────────────────────────
  if (phase === "howItWorks") return (
    <div style={P.page}>
      <h1 style={{ ...P.title, fontSize: 28, marginTop: 12 }}>HOW IT WORKS</h1>
      <p style={{ textAlign: "center", fontSize: 12, color: "#94a3b8", marginBottom: 16 }}>Two hormones keep blood calcium in the safe zone. PTH does most of the heavy lifting; calcitonin plays a smaller, fine-tuning role.</p>
      <div style={{ maxWidth: 520, margin: "0 auto", display: "flex", gap: 14, flexWrap: "wrap" }}>
        <div style={{ flex: "1 1 220px", background: "#1e293b", borderRadius: 14, padding: "16px 18px", border: "2px solid #818cf8" }}>
          <div style={{ fontSize: 28, textAlign: "center" }}>⬆️</div>
          <div style={{ fontSize: 16, fontWeight: 800, color: "#818cf8", textAlign: "center", marginBottom: 6 }}>PTH (Parathyroid Hormone)</div>
          <div style={{ fontSize: 12, color: "#cbd5e1", lineHeight: 1.6 }}>
            Released when blood Ca²⁺ is <strong style={{ color: "#f87171" }}>too low</strong>.
          </div>
          <div style={{ fontSize: 11, color: "#94a3b8", lineHeight: 1.6, marginTop: 6 }}>
            🦴 Pulls Ca²⁺ from bones<br/>
            🫘 Tells kidneys to save Ca²⁺<br/>
            ☀️ Activates Vitamin D → intestines absorb more
          </div>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#818cf8", textAlign: "center", marginTop: 8 }}>Net effect: Ca²⁺ goes UP ↑</div>
        </div>
        <div style={{ flex: "1 1 220px", background: "#1e293b", borderRadius: 14, padding: "16px 18px", border: "2px solid #f472b6" }}>
          <div style={{ fontSize: 28, textAlign: "center" }}>⬇️</div>
          <div style={{ fontSize: 16, fontWeight: 800, color: "#f472b6", textAlign: "center", marginBottom: 6 }}>Calcitonin</div>
          <div style={{ fontSize: 12, color: "#cbd5e1", lineHeight: 1.6 }}>
            Released when blood Ca²⁺ is <strong style={{ color: "#fbbf24" }}>too high</strong>.
          </div>
          <div style={{ fontSize: 11, color: "#94a3b8", lineHeight: 1.6, marginTop: 6 }}>
            🦴 Deposits Ca²⁺ into bones<br/>
            🫘 Tells kidneys to excrete Ca²⁺<br/>
            ☀️ Vitamin D stays off
          </div>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#f472b6", textAlign: "center", marginTop: 8 }}>Net effect: Ca²⁺ goes DOWN ↓</div>
        </div>
      </div>
      <div style={{ maxWidth: 520, margin: "12px auto 0", background: "#0f172a", borderRadius: 10, padding: "10px 14px", border: "1px solid #334155", textAlign: "center" }}>
        <div style={{ fontSize: 11, color: "#94a3b8", lineHeight: 1.6 }}>
          Your job: read each scenario, decide if blood Ca²⁺ is rising or falling, then pick the hormone the body would release to fix it.
        </div>
      </div>
      <div style={{ textAlign: "center", marginTop: 16 }}>
        <button style={{ ...P.go, display: "inline-block", width: "auto", padding: "14px 48px", fontSize: 16 }}
          onClick={() => { SFX.click(); setHasSeenHowItWorks(true); setPhase("playing"); }}
          onMouseOver={e => e.target.style.transform = "scale(1.03)"} onMouseOut={e => e.target.style.transform = "scale(1)"}>
          Got it, time to play! →
        </button>
      </div>

                </div>
              )}
              <div style={{ fontSize: 18, fontWeight: 800, color: fb.ok ? "#22c55e" : "#dc2626", marginBottom: 4 }}>
                {fb.out ? "⏰ Time's up" : fb.ok ? `✓ +${fb.pts}${fb.ns > 1 ? ` (${fb.ns}x)` : ""}` : "✗ Not quite"}
              </div>
              <div style={{ fontSize: 12, color: "#94a3b8", marginBottom: 6 }}>
                Answer: <strong style={{ color: ans.color }}>{ans.text}</strong>
              </div>
              {/* Hint system: wrong answers show hint first, then expandable full explanation */}
              {!fb.ok && !showFullWhy ? (
                <div>
                  <div style={{ fontSize: 12, lineHeight: 1.6, color: "#fbbf24", fontStyle: "italic", marginBottom: 6 }}>
                    💡 {getHint(fb.sc, fb.choice)}
                  </div>
                  <button onClick={() => setShowFullWhy(true)} style={{ background: "none", border: "1px solid #334155", borderRadius: 6, padding: "4px 10px", color: "#94a3b8", fontSize: 10, cursor: "pointer" }}>
                    Show full explanation ▸
                  </button>
                </div>
              ) : (
                <div style={{ fontSize: 12, lineHeight: 1.6, color: "#cbd5e1" }}>{fb.sc.why}</div>
              )}
              <OrganPills organs={fb.sc.organs} />
              {/* Counseling step for scenarios with access barriers */}
              {fb.sc.counselQ && (
                <div style={{ marginTop: 8 }}>
                  {!showCounsel ? (
                    <button onClick={() => setShowCounsel(true)} style={{ background: "rgba(168,85,247,0.1)", border: "1px solid rgba(168,85,247,0.3)", borderRadius: 8, padding: "6px 12px", color: "#a78bfa", fontSize: 10, fontWeight: 600, cursor: "pointer", width: "100%" }}>
                      🩺 Clinical thinking: What would you recommend for this patient?
                    </button>
                  ) : (
                    <div style={{ background: "rgba(168,85,247,0.06)", borderRadius: 8, padding: "8px 12px", border: "1px solid rgba(168,85,247,0.2)" }}>
                      <div style={{ fontSize: 10, fontWeight: 700, color: "#a78bfa", marginBottom: 4 }}>🩺 COUNSELING CONSIDERATION</div>
                      <div style={{ fontSize: 11, color: "#cbd5e1", lineHeight: 1.5 }}>{fb.sc.counselQ}</div>
                    </div>
                  )}
                </div>
              )}
            </div>
            <button style={P.go} onClick={next}
              onMouseOver={e => e.target.style.transform = "scale(1.01)"} onMouseOut={e => e.target.style.transform = "scale(1)"}>
              {idx + 1 >= scenarios.length ? "Results →" : "Next →"}
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ─── RESULTS ───────────────────────────────────────────────────────────
  if (phase === "results") {
    const scored = history.filter(h => h.choice !== "baseline");
    const ok = scored.filter(h => h.ok).length;
    const pct = scored.length > 0 ? Math.round((ok / scored.length) * 100) : 0;
    const g = pct === 100 ? { e: "🏆", l: "Homeostasis Master", c: "#22c55e" }
      : pct >= 75 ? { e: "🌟", l: "Strong Regulator", c: "#38bdf8" }
      : pct >= 50 ? { e: "📈", l: "Building Understanding", c: "#f59e0b" }
      : { e: "🔬", l: "Keep Reviewing", c: "#f472b6" };
    const canUnlockNext = reflectPick && level < 3 && !unlocked.includes(level + 1);
    const lv = LEVELS[level - 1];

    // Reflection questions per level
    const reflections = level === 1
      ? [{ k: "diet", l: "🍽️ Diet alone" }, { k: "meds", l: "💊 Medications" }, { k: "equity", l: "⚖️ Skin tone, geography & lifestyle" }, { k: "surgery", l: "🏥 Surgical damage" }]
      : level === 2
      ? [{ k: "vitd", l: "☀️ Vitamin D status" }, { k: "access", l: "💰 Access to care" }, { k: "context", l: "🏠 Patient's life context" }, { k: "organs", l: "🫘 Organ function" }]
      : [{ k: "where", l: "🔍 Where the loop breaks" }, { k: "who", l: "⚖️ Who gets diagnosed fast" }, { k: "both", l: "🔗 Both: biology + access" }, { k: "signal", l: "📡 The signal itself" }];

    const reflectResponse = (pick) => {
      if (level === 1) {
        if (pick === "equity") return "✓ Great insight. Melanin, latitude, occupation, and food access create Vitamin D disparities that compound over a lifetime. Biology does not change; circumstances do.";
        if (pick === "meds") return "Medications matter, but consider: who has access to monitoring? Structural factors often determine which patients get caught early and which do not.";
        if (pick === "surgery") return "Acute emergencies are dramatic, but chronic conditions driven by lifestyle and geography affect far more people. Think about who is at risk and why.";
        return "Diet contributes, but the bigger question is: who has access to varied, calcium-rich foods? Food insecurity is a hidden calcium crisis.";
      }
      if (level === 2) {
        if (pick === "vitd") return "Vitamin D is biologically central, but ask: who has enough of it? Geography, skin tone, income, and food access determine Vitamin D status before any hormone kicks in.";
        if (pick === "access") return "✓ Knowing you need Vitamin D does not help if you cannot afford supplements, reach a doctor, or read the label. Access determines outcomes.";
        if (pick === "context") return "✓ A patient's life (job, insurance, language, housing) shapes whether the 'right' treatment actually works. Biology in a vacuum does not exist.";
        return "Organ function matters, but a healthy organ in a patient who cannot afford follow-up care is still a patient at risk.";
      }
      // Level 3
      if (pick === "both") return "✓ Exactly. The same broken loop produces different outcomes depending on who the patient is. Finding the break is step one; ensuring the patient can access treatment is step two.";
      if (pick === "where") return "Finding the break is essential, but two patients with the same broken loop can have very different outcomes depending on insurance, geography, and timing of diagnosis.";
      if (pick === "who") return "Diagnosis speed depends on access to specialists, genetic testing, and provider awareness. The biology is identical; the timeline is not.";
      return "The signal matters, but in most cases the issue is at the sensor or effector, not the hormone itself. And who gets diagnosed depends on access.";
    };

    return (
      <div style={P.page}>
        <h1 style={{ ...P.title, fontSize: 28, marginTop: 12 }}>CALCIUM CRISIS</h1>
        <LevelBadge />
        <div style={{ ...P.card, textAlign: "center", padding: "24px 20px", marginTop: 10 }}>
          <div style={{ fontSize: 48 }}>{g.e}</div>
          <div style={{ fontSize: 20, fontWeight: 800, color: g.c, marginBottom: 12 }}>{g.l}</div>
          <div style={{ display: "flex", gap: 10, justifyContent: "center", marginBottom: 16 }}>
            {[{ n: score, l: "Points" }, { n: `${ok}/${scored.length}`, l: "Correct" }, { n: best, l: "Streak" }].map((s, i) => (
              <div key={i} style={{ background: "#0f172a", borderRadius: 10, padding: "12px 20px" }}>
                <div style={{ fontSize: 24, fontWeight: 800, color: lv.color }}>{s.n}</div>
                <div style={{ fontSize: 9, color: "#64748b", textTransform: "uppercase" }}>{s.l}</div>
              </div>
            ))}
          </div>
          {/* History dots */}
          <div style={{ display: "flex", gap: 6, justifyContent: "center", flexWrap: "wrap", marginBottom: 16 }}>
            {history.map((h, i) => {
              const isBase = h.choice === "baseline";
              return (
                <div key={i} style={{
                  display: "flex", alignItems: "center", gap: 6, padding: "5px 10px", borderRadius: 6,
                  background: isBase ? "rgba(129,140,248,0.06)" : h.ok ? "rgba(34,197,94,0.08)" : "rgba(220,38,38,0.08)",
                }}>
                  <div style={{ width: 6, height: 6, borderRadius: "50%", background: isBase ? "#818cf8" : h.ok ? "#22c55e" : "#dc2626" }} />
                  <span style={{ fontSize: 11, color: "#cbd5e1" }}>{isBase ? "Baseline ⚖️" : h.title}</span>
                </div>
              );
            })}
          </div>
          {/* Takeaway + Reflection */}
          <div style={{ background: "#0f172a", borderRadius: 10, padding: "12px 14px", textAlign: "left", border: "1px solid #334155" }}>
            {level === 1 && (
              <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
                <div style={{ flex: "1 1 200px" }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "#22c55e", marginBottom: 4 }}>🧠 HOMEOSTASIS</div>
                  <div style={{ fontSize: 11, color: "#cbd5e1", lineHeight: 1.5 }}>
                    <strong style={{ color: "#818cf8" }}>PTH ↑ Ca²⁺</strong>: kidneys save Ca²⁺ + activate <strong style={{ color: "#f59e0b" }}>Vit D</strong> → intestines absorb more → bones release reserves.
                    <br /><strong style={{ color: "#f472b6" }}>Calcitonin ↓ Ca²⁺</strong>: kidneys excrete, bones store, Vit D stays off.
                  </div>
                </div>
                <div style={{ flex: "1 1 200px" }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "#f59e0b", marginBottom: 4 }}>⚖️ EQUITY</div>
                  <div style={{ fontSize: 11, color: "#cbd5e1", lineHeight: 1.5 }}>
                    Vit D depends on UV-B → melanin (~50% reduced synthesis), latitude, sunscreen, and lifestyle create real health disparities. Supplementation (2000 IU/day) is evidence-based.
                  </div>
                </div>
              </div>
            )}
            {level === 2 && (
              <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
                <div style={{ flex: "1 1 200px" }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "#f59e0b", marginBottom: 4 }}>☀️ VITAMIN D ROLE</div>
                  <div style={{ fontSize: 11, color: "#cbd5e1", lineHeight: 1.5 }}>
                    Vitamin D is the key that unlocks intestinal absorption. Without it, PTH cannot fully compensate. Many conditions (CKD, celiac, malabsorption, aging) break the Vit D pathway, not just low sun exposure.
                  </div>
                </div>
                <div style={{ flex: "1 1 200px" }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "#818cf8", marginBottom: 4 }}>🩺 CLINICAL</div>
                  <div style={{ fontSize: 11, color: "#cbd5e1", lineHeight: 1.5 }}>
                    Choosing the right intervention matters: giving PTH when the problem is Vit D deficiency would accelerate bone loss. Giving active Vitamin D directly bypasses kidney failure. Context determines treatment.
                  </div>
                </div>
              </div>
            )}
            {level === 3 && (
              <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
                <div style={{ flex: "1 1 200px" }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "#f472b6", marginBottom: 4 }}>🔗 LOOP ANALYSIS</div>
                  <div style={{ fontSize: 11, color: "#cbd5e1", lineHeight: 1.5 }}>
                    Every feedback loop has sensors, signals, and effectors. Finding WHERE the loop is broken is the key to diagnosis. The same symptom (low Ca²⁺) can have very different causes depending on which component failed.
                  </div>
                </div>
                <div style={{ flex: "1 1 200px" }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "#38bdf8", marginBottom: 4 }}>🧠 SYSTEMS THINKING</div>
                  <div style={{ fontSize: 11, color: "#cbd5e1", lineHeight: 1.5 }}>
                    A broken sensor (parathyroid adenoma) vs a broken effector (CKD kidneys) vs a broken absorber (celiac intestines) all produce abnormal Ca²⁺ but require completely different treatments. Diagnosis before treatment.
                  </div>
                </div>
              </div>
            )}
            {/* Interactive reflection */}
            <div style={{ marginTop: 10, padding: "10px 12px", borderRadius: 8, background: `${lv.color}08`, border: `1px solid ${lv.color}20` }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: lv.color, marginBottom: 6, textAlign: "center" }}>💭 REFLECT TO CONTINUE</div>
              <div style={{ fontSize: 11, color: "#94a3b8", marginBottom: 8, textAlign: "center" }}>
                {level === 1 ? "Which factor had the biggest impact on calcium balance?"
                  : level === 2 ? "What matters most for whether a patient gets better?"
                  : "What determines patient outcomes when the feedback loop breaks?"}
              </div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", justifyContent: "center" }}>
                {reflections.map(r => (
                  <button key={r.k} onClick={() => { setReflectPick(r.k); if (level === 3) SFX.celebrate(); else SFX.click(); }} style={{
                    padding: "6px 12px", borderRadius: 8, fontSize: 10, fontWeight: 600, cursor: "pointer",
                    border: `1.5px solid ${reflectPick === r.k ? lv.color : "#334155"}`,
                    background: reflectPick === r.k ? `${lv.color}18` : "transparent",
                    color: reflectPick === r.k ? lv.color : "#94a3b8", transition: "all 0.15s",
                  }}>{r.l}</button>
                ))}
              </div>
              {reflectPick && (
                <div style={{ marginTop: 8, fontSize: 11, color: "#cbd5e1", lineHeight: 1.5, textAlign: "center" }}>
                  {reflectResponse(reflectPick)}
                </div>
              )}
            </div>
          </div>

          {/* Level 3 completion celebration */}
          {level === 3 && reflectPick && (
            <div style={{
              marginTop: 14, padding: "16px 20px", borderRadius: 12, textAlign: "center",
              background: "linear-gradient(135deg, rgba(250,204,21,0.12), rgba(168,85,247,0.12), rgba(34,197,94,0.12))",
              border: "1.5px solid rgba(250,204,21,0.3)",
            }}>
              <div style={{ fontSize: 28, marginBottom: 6 }}>🏆</div>
              <div style={{ fontSize: 16, fontWeight: 800, color: "#fbbf24", marginBottom: 4 }}>
                Calcium Crisis: Mastered!
              </div>
              <div style={{ fontSize: 12, color: "#cbd5e1", lineHeight: 1.5, maxWidth: 400, margin: "0 auto" }}>
                You completed all three levels of calcium homeostasis. From healthy baselines to clinical interventions to diagnosing broken feedback loops, you now have a systems-level understanding of how the body regulates calcium.
              </div>
            </div>
          )}

          {/* Action buttons */}
          <div style={{ display: "flex", gap: 10, marginTop: 14, justifyContent: "center", flexWrap: "wrap" }}>
            <button style={{ ...P.go, flex: "1 1 auto", maxWidth: 200 }}
              onClick={() => { SFX.click(); startLevel(level); }}>
              Replay Level {level} →
            </button>
            {canUnlockNext && (
              <button style={{ ...P.go, flex: "1 1 auto", maxWidth: 240, background: `linear-gradient(90deg, ${LEVELS[level].color}, ${LEVELS[level - 1].color})` }}
                onClick={() => {
                  const nextLvl = level + 1;
                  setUnlocked(u => [...u, nextLvl]);
                  setLevelScores(ls => ({ ...ls, [level]: { ok, total: scored.length, pct } }));
                  setUnlockLevel(nextLvl);
                  setPhase("unlock");
                  SFX.unlock();
                }}>
                Unlock Level {level + 1} 🔓
              </button>
            )}
            {!reflectPick && level < 3 && !unlocked.includes(level + 1) && (
              <div style={{ fontSize: 11, color: "#f59e0b", padding: "10px 14px", background: "rgba(245,158,11,0.08)", borderRadius: 8, border: "1px solid rgba(245,158,11,0.2)" }}>
                ↑ Answer the reflection question above to unlock Level {level + 1}
              </div>
            )}
            {!canUnlockNext && unlocked.includes(level + 1) && level < 3 && (
              <button style={{ ...P.go, flex: "1 1 auto", maxWidth: 200, background: `linear-gradient(90deg, ${LEVELS[level].color}, ${LEVELS[level - 1].color})` }}
                onClick={() => {
                  SFX.click();
                  setLevelScores(ls => ({ ...ls, [level]: { ok, total: scored.length, pct } }));
                  startLevel(level + 1);
                }}>
                Play Level {level + 1} →
              </button>
            )}
            <button onClick={() => {
              SFX.click();
              setLevelScores(ls => ({ ...ls, [level]: { ok, total: scored.length, pct } }));
              setPhase("levelSelect"); setCa(10); setTargetCa(10); setHormone(null); setBrokenHighlight(null); setReflectPick(null);
            }} style={{ background: "none", border: "1px solid #334155", borderRadius: 10, padding: "12px 20px", color: "#94a3b8", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
              Level Select
            </button>
          </div>
        </div>
      </div>
    );
  }
  return null;
}

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<CalciumCrisis />);
  </script>
</body>
</html>
